services:
  neo4j:
    image: neo4j:2026.01.4-community-ubi10
    container_name: neo4j-prototype
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password12345
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_PLUGINS: '["apoc","genai"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - pipeline_net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-prototype
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - pipeline_net

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.10.1
    container_name: iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      CATALOG_S3_ACCESS_KEY_ID: minioadmin
      CATALOG_S3_SECRET_ACCESS_KEY: minioadmin123
    ports:
      - "8181:8181"
    networks:
      - pipeline_net

  spark:
    image: tabulario/spark-iceberg:latest
    container_name: spark-iceberg
    depends_on:
      iceberg-rest:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
    command: ["sleep", "infinity"]
    networks:
      - pipeline_net

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  minio_data:

networks:
  pipeline_net:
    name: prototype-pipeline_pipeline_net
    driver: bridge
